logging:
  level:
    ROOT: INFO
    at:
      abcdef:
        memmaster: INFO
spring:
  devtools:
    restart:
      enabled: true
      additional-exclude: static/**
    livereload:
      enabled: false
  jackson:
    serialization:
      INDENT_OUTPUT: true
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: jdbc:mariadb://localhost:3306/memmaster?useLegacyDatetimeCode=false&serverTimezone=UTC&useUnicode=true&characterEncoding=utf8
    username: memmaster
    password: memmemmem
    hikari:
      poolName: Hikari
      auto-commit: true
      data-source-properties:
        cachePrepStmts: true
        prepStmtCacheSize: 250
        prepStmtCacheSqlLimit: 2048
        useServerPrepStmts: true
  jpa:
    database: MYSQL
    show-sql: true
    properties:
      hibernate.connection.provider_disables_autocommit: true
      hibernate.generate_statistics: false
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true
  cache:
    type: caffeine
    cache-names: roleByName,settingsEmailCache,settingsGlobalCache,loadAvatar
    caffeine:
      spec: maximumSize=100,expireAfterWrite=3600s
  mail:
    host: localhost
    port: '25'
  thymeleaf:
    cache: false
server:
  port: 8585
management:
  endpoints:
    web:
      cors:
        allowed-origins: "http://localhost:4200"

# App Properties
application:
  general:
    baseUrl: 'http://localhost:8585/'
    crawler-schedulers: true
  mail:
    from: support-memmaster@homesite.by
    baseUrl: 'http://localhost:4200/'
  upload:
    local-path: 'C:/work/java/memmaster/static/'
    upload-dir: uploads
    attach-dir: attachments
    cards-dir: cards
  cors:
    allowed-origins: 'http://localhost:8585,http://localhost:4200'
  security:
    seed-key: 320bb523b651c669faaf027266d8bc33a98c461e73ba9747f79166d21a9f16
  translator:
    ssl:
      trust-store: 'c:/Entwicklung/translator-truststore.jks'
      trust-store-password: 'changeit'
      trust-store-type: JKS
  oauth:
    google-client-id: '${APPLICATION_OAUTH_GOOGLE_CLIENT_ID:}'
