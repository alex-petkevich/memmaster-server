services:
  mysql:
    image: mysql:8.4
    container_name: memmaster-mysql
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: memmaster
      MYSQL_USER: memmaster
      MYSQL_PASSWORD: memmemmem
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - memmaster

  memmaster-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: memmaster-server
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8383
      SPRING_DATASOURCE_URL: jdbc:mariadb://mysql:3306/memmaster?useLegacyDatetimeCode=false&serverTimezone=UTC&useUnicode=true&characterEncoding=utf8
      SPRING_DATASOURCE_USERNAME: memmaster
      SPRING_DATASOURCE_PASSWORD: memmemmem
      APPLICATION_GENERAL_BASEURL: http://localhost/
      APPLICATION_MAIL_BASEURL: http://localhost/
      APPLICATION_UPLOAD_LOCAL_PATH: /opt/memmaster/data/
    ports:
      - "8383:8383"
    volumes:
      - ${MEMMASTER_UPLOADS_PATH:-./data/uploads}:/opt/memmaster/data
    networks:
      - memmaster

  memmaster-client:
    build:
      context: ../memmaster-client
      dockerfile: Dockerfile
    container_name: memmaster-client
    restart: unless-stopped
    depends_on:
      - memmaster-server
    ports:
      - "4200:80"
    networks:
      - memmaster

volumes:
  mysql_data:

networks:
  memmaster:
    driver: bridge

